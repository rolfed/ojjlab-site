name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows publish.yml to reuse this workflow
  workflow_call:

jobs:
  quality:
    name: Lint, Typecheck, Unit Tests, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  worker:
    name: Worker — Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Worker
        run: pnpm --filter ojjlab-worker typecheck

      - name: Build Worker (dry run)
        run: pnpm --filter ojjlab-worker build

  guardrails:
    name: Repository guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: .env must be gitignored
        run: grep -qxF '.env' .gitignore

      - name: .env.example must be committed
        run: test -f .env.example

      - name: .dev.vars must be gitignored
        run: grep -q 'apps/worker/.dev.vars' .gitignore

      - name: .dev.vars.example must be committed
        run: test -f apps/worker/.dev.vars.example

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium firefox webkit

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          BASE_URL: http://localhost:4173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
