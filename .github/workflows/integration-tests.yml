name: Integration Tests

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  health-check:
    name: Worker health check — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests (staging)
        if: inputs.environment == 'staging'
        run: pnpm --filter ojjlab-worker test:integration
        env:
          WORKER_URL: https://ojjlab-worker-staging.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev

      - name: Run integration tests (production)
        if: inputs.environment == 'production'
        run: pnpm --filter ojjlab-worker test:integration
        env:
          WORKER_URL: https://ojjlab.com
