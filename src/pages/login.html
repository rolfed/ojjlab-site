<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Member Login — Oregon Jiu Jitsu Lab</title>
    <meta
      name="description"
      content="Access your Oregon Jiu Jitsu Lab member account to view your schedule, attendance, and billing."
    />
    <meta property="og:title" content="Member Login — Oregon Jiu Jitsu Lab" />
    <meta
      property="og:description"
      content="Access your Oregon Jiu Jitsu Lab member account to view your schedule, attendance, and billing."
    />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body class="bg-brand-primary text-neutral-100">
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <ojj-site-header current-page="/login/" data-turbo-permanent id="site-header"></ojj-site-header>

    <main id="main-content" tabindex="-1">
      <section aria-labelledby="login-heading">
        <h1 id="login-heading">Member Login</h1>
        <p>Access your schedule, attendance, and account through our member portal.</p>
        <a
          href="#"
          id="gymdesk-login-link"
          rel="noopener noreferrer"
          target="_blank"
          aria-describedby="login-external-notice"
          data-turbo="false"
        >
          Go to Member Portal
        </a>
        <p id="login-external-notice">
          Opens GymDesk — our member management system. You will be redirected to an external site.
        </p>
      </section>
    </main>

    <ojj-site-footer></ojj-site-footer>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/pages/login.ts"></script>
  </body>
</html>
